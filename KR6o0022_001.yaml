body:
  text: 正等寺沙門慧沼續能立法不成者至猶如極微述曰下別釋中初同後異同中有二初別解五後總結成初別解五即為五段由第二相正顯於因順成所立故先明之所立隨因故次後辨解初不成有二初牒前舉後約計釋成此即初也能立法不成者牒前餘者舉體猶如極微正舉能立不成體舉宗因者顯喻過故如聲論師對於勝論立聲是常宗兩俱許聲體無質礙以勝論師聲是德句德句無礙聲論雖無德句然以其聲隔障等聞故知無礙若據合顯亦是因過以心心所為因同法無礙因轉前已明因今辨喻過故不言因然彼極微所成立法常性是有述曰此下釋不成中有二初明所立有後辨能立無此初也以聲勝論俱計極微體常住故準釋能立無此處應言以諸極微常住性故以互意存影顯故略無也能成立法無質礙無以諸極微質礙性故述曰此釋能立無此聲勝論計微質礙故無能立問因為成宗因有兩俱隨一等過喻亦成宗何故名能立不成不明餘耶答因親成宗故有四過喻是助成故無四過又解因是初相據初辨四顯第二相亦有四種彼開此合義實相似以喻唯因亦有四種一兩俱不成即論説是隨一不成彼聲論師對薩婆多立聲常宗無質礙因舉喻如業佛法不許即是隨一雖俱所立無且辨能隨一猶豫不成準理有二一宗二因前已具顯今喻亦二於中綺互或因猶豫非喻能立或喻能立非因猶豫或俱猶豫或俱不猶豫前三是過第四非過且因猶豫非喻能立者如於霧等性起疑惑時為煙為霧即立彼處定應有火以現煙故如厨舍等處或指如餘疑或同喻舉一例餘即可思準問因是宗法有法猶豫因可成過如厨等喻立敵俱決知定是煙何成猶豫答舉喻成因又解因有三相二喻即因既第二相何非猶豫因既致惑喻成不決故亦成過能立所依不成者不同於因有第二三相無宗有法但闕初相此所依無能立亦無然亦得名無能立所依不成如數論師對佛弟子立思受用諸法宗以是神我故如眼等根若言假我因喻無過今言以是神我故因佛法不許故隨一無此因既無故喻無依此約依因或喻所依無名所依不成且約依因如下更解然有説言若所依無即無俱不成此未必爾如清辨師立聲是空以所作性故如空華等此所作性依俗兩有空華並無雖有所立可非能立所依不成又有云謂所立既成必有所依故無第四不成之過今謂不爾為依於彼所立之宗為喻依上所立無常若依所立因喻相似喻依因不依故知不可若依喻上所立無常者是非喻依依極微故亦復不可又縱有所立不立第四過或若所立無第四豈不立設雙依彼有法及法如俱不成豈無此過若言即依因如闕宗因豈無此過問若喻上能立不依所立能立依何答二解一云以依因故因無依無問若因無依喻是何過答若因依無即不成因因體非有即是喻中所依不成問若言因無依故即因不成故喻能立亦無所依不成者即無無宗有因喻等諸缺滅句若言無能別故為無宗者豈無所別不無宗耶若言無所別即宗因無者因有三相彼但無初後二相有何不名因若言過故不名因者即十四因總名不成皆有過故何須別説然準道理言因之時唯取初相有法無故闕無初相即是無因此即應言無有法宗因亦不成言無宗有因者約無能別宗亦復無妨問喻上能立何不依宗有法而依因耶答以隔因故問若隔因故應不成宗答助因有力故説成宗問喻既依因舉彼瓶等欲何所用答所依有二一自體依二所助依瓶自體依因所助依一云盡理而言準論但約自體辨依據兩俱隨一但望喻依不可説言無礙因上兩俱隨一不許無礙但於喻依許不許故此説為善順論又故問何以得知有此四過答準因可有喻既助因因既無已喻何所助如因成宗有法無故因何所成故並為過此中細準有自他共全分一分有體無體恐繁且止所立法不成者謂説如覺述曰解所立不成有二初牒前舉體後約計釋成此初也牒前總列宗因同前但別舉喻謂説如覺覺者即心心法之總名也然一初覺能成立法無質礙有述曰下釋成初能立有後所立無此初也以心心法皆無礙故文準於前所成立法常住性無以一切覺皆無常故述曰釋所立無喻上常住實非所立即同於彼所立能立二種法者即是其喻從所同為名故名所立準前能立亦有四種即文所辨兩俱不成若舉方時對大乘立隨一不成外道立常而無質礙佛法無常亦同無礙法上假故猶豫所立不成者猶豫亦二綺互亦四準前能立如大乘人對薩婆多立預流等定有大乘種姓然不定知此預流等有大乘姓不故懷猶豫因云有性攝故如餘有情亦懷猶豫不知定有大乘姓不此俱猶豫餘者類思所依不成者且約依宗為喻所依如數論師對佛法者立眼等根為神我受用同喻如色等此即能別不極成故喻無所立亦無所依由無所依喻上所立亦不得成有云既有能立故無第四今難若二立無豈無此過故定為四問喻上所立為依何法若依能立不應説因獨依有法以因喻二俱能立故若依所立如前已難答有二解一云依因雖俱能立不同於因依於有法以隔因故一云依宗所立若爾即有隨一所依不成宗中所立敵不許故答既云諸皆方舉於喻即兼合己證彼極成故得為依不同舉因未極成故若爾有舉因已即解宗者依所立不答亦不得同喻先以不合故又或舉因有未解故若爾舉喻未解如何一云依喻所依諸説但舉瓶空等法為喻依故此解為正若據後解所依不成彼聲論師對大乘立舉極微為喻此闕所依所依既無所立亦關以大乘宗不立微故細準而言有自他共全分一分有體無體思之可悉恐繁不述俱不成者述曰下解第三過文分為三初總牒彰次別開列後重釋成此初也復有二種有及非有述曰此別開列也初開後列此二文也有謂有彼喻依無即無彼喻依俱不成者即謂二立兩非有也若言如瓶有俱不成若説如空對無空論無俱不成述曰此重釋成以立聲常無質礙因瓶體雖有常無礙無虗空體無二亦不立有無雖二皆是俱無同無二立故問虗空體無常可不有空體非有無礙寧無答立常住宗無質礙因宗因俱表虗空不有常與無礙二表俱無故成過也理門但舉有喻所依然兩俱隨一猶豫所依及喻無依皆略不明準此有無有即初二無即第四或有或無即第三過此有四句一宗因俱有體無俱不成即對無空論是此中細分有三十六且共宗因有體為首對共自他無俱不成綺互有三四句自他宗因有體對亦各三合九四句下三句中亦各準此即合三十六種四句更以分全相對綺互恐繁不述今且約總為此四句二宗因無體有俱不成如數論師對薩婆多立思是我以受用二十三諦故如瓶盆等三宗因有體有俱不成即論所説有俱不成是四宗因無體無俱不俱即前第二對佛法中無空論者然此亦有兩俱隨一猶豫及所依俱不成初三各二有及非有且依有俱不成兩俱有俱不成如論説是隨一有二一自隨一有俱不成者如外道立我能受苦樂以作業故對佛法中無空論者取為同喻二他隨一有俱不成如説聲常無質礙故對佛法者同喻如語業猶豫有俱不成者如説彼厨等中定有火以現煙故如山等處於霧等性既懷猶豫火有不決山處是有故成猶豫有俱不成所依不成者喻依既有闕無此句若説依因宗即有此句前四句中第二句是宗因無故前之四種隨其所應亦有共及自他有體無體全分一分思準可知無俱不成亦可準此恐繁不述問前二偏無何故不開有無二即答有可互闕無並不成故但合明不開二種又雙無既開顯偏亦爾偏既不立俱無亦然以影略故前解為正無俱不成俱有兩俱隨一無猶豫及所依不成兩俱無俱不成如聲論師對勝論師立聲常宗所聞性因如第八識二俱不立有第八識故隨一無俱不成者如聲論師對大乘者立此比量彼自不許有第八識故是自隨一若聲論立此對佛弟子舉聲性喻即他隨一何故無猶豫無俱不成者既無喻依決無二立疑決既異故闕此句所依不成若説依喻即向説是皆無喻依故説依宗因即前宗因望喻四句中第四句是於中復有全分一分恐繁不述問真如常有故説為常虗空恆無設對無空常何非有又虗空無何非無礙答夫立宗法略有二種一者但遮而無有表如言我無但欲遮我不欲立無喻亦但遮而不取表二遮亦表如説我常非但遮無常亦表有常體喻即具遮表依前喻無體有遮亦得成依後但有遮無表二立闕今立聲常是有遮表對無空論但有其遮而無其表故是喻過有云聲宗上遮表虗空喻上遮別既兩俱成總非能立闕彼自答若聲論師作此立者即是所立不成過者今謂不然虗空之上但有遮無常無所表常即所立不成既但遮礙無所表礙何非能立闕古敘他救聲云無礙有遮有表喻遮非表喻不似因亦不得成即自破云如咽等所作杖等所作雖不相似所作義同亦得成喻者今謂此亦不爾同有所作即遮表同故得為因彼遮無表不與此例古又云聲宗無礙但取其遮故空同喻能立得有又敘難云宗喻具二取遮非表亦無能立者即自破云亦應小乘對大乘立虗空是常以非作故立者許具遮表敵者即唯有遮望自應有隨一不成過故知能立不成者不約具遮表此意以立對敵敵但許有遮亦得成喻全不許者方是喻過故將此量為決定相違過者此量亦非誰言無過對大乘立即無空論所別不成宗無簡故因有隨一并闕所依及不定過為如擇滅為類龜毛彼立空常具有遮表龜毛無表故成亦有有法自相相違意立離如別體是空彼此共許擇滅無為非是虗空空是所諍故成相違又擇滅喻常與非作共許遮表非是不成故所引非又有云設若救言聲空俱取於遮不取於表可非能立闕不成過然有破云若聲取遮不取表者因喻亦爾即有二過違理及教以陳那菩薩理門論云前是遮詮後唯止濫同唯取遮故違於教此難亦非以彼外道不以理門為定量故今者解云此約虗空辨無二立者據彼本計言常無礙具有遮表不唯取遮故是喻過若唯取遮可違理失宗因喻三俱有義故或可違彼定因所造本因明論世共許故可名違教無合者述曰下解第四過有四一牒章二標體三釋義四示法此初也謂於是處無有配合述曰標無合體謂於是喻處言配合者相屬著義若不言諸所作者皆是無常猶如瓶等即便不證有所作處無常必隨即所作無常不相屬著是無合義由此無合縱使聲上見有所作不能成立聲是無常故若無合即是喻過若云諸所作者皆是無常猶如瓶等即能證彼無常必隨所作性聲既有所作亦必無常隨即相屬著是有合義問諸所作者皆是無常合宗因不有云不合以聲無常他不許故但合宗外餘有所作及無常猶此相屬能顯聲上有所作故無常必隨今謂不爾立喻本欲成宗合既不合於宗立喻何關宗事故云諸所作者即苞瓶等一切所作及聲上所作皆是無常者即瓶等一切所作及聲上所作皆是無常者即瓶等一切無常并聲無常即以無常合屬所作不欲以瓶所作合聲所作瓶無常合聲無常若不無常合屬所作如何解同喻云説因宗所隨若云聲無常他不許不合者不爾若彼許者即立己成以彼不許故須合顯云諸所作皆是無常猶如瓶等故集論云以未所見邊與所見邊和合正説名之為喻又設難云異喻亦言諸皆豈欲籠括宗因邪答不例異喻本欲離彼宗因顯無宗處因定不有如何得合返顯順成諸皆之言定合聲上所作與彼無常令屬著因問若爾喻合并説初相云何理門云同喻等顯第二相答同喻體正顯第二若説合言喻上別義是故古師於能立中別立合結又於同喻不説唯顯第二相言故亦無失但於瓶等雙現能立所立二法述曰此釋義也謂但言譬如瓶等有所作性及無常性不以所作成無常但於瓶上雙現所作及無常性不云諸所作者皆是無常此釋前也言如於瓶見所作性及無常性述曰此示法也但舉喻云如瓶見有所作及於無常不言諸所作者皆無常故是無合若如古師立聲無常以所作故猶若於瓶即別合云瓶有所作瓶即無常當知聲有所作聲亦無常故因喻外別立合支陳那菩薩云諸所作者皆是無常即以瓶等所作并苞聲上所作之性定是無常猶如瓶等瓶等所作有作有無常即顯聲有所作非常住即於喻上義立合言何須別立於合支也由此準知喻上諸皆具合宗喻若不如是豈得廢舊所立合支倒合者述曰下解第五過文有其二初牒後釋此初也謂應説言諸所作者皆是無常述曰下釋釋中有二初舉正合後正顯倒此初也宗因可知而倒説言諸無常者皆是所作述曰正顯倒也謂正應以所作證無常今翻無常證所作故是喻過即成非所立有違自宗及相符等故理門云説因宗所隨宗無因不有此二名譬喻餘皆此相似又云應以所作證無常翻以無常成所作若爾應成非所樂不遍非樂等合離如正喻中已廣分別前之三過皆有自他共分全等此後二過但有共全無所餘也或可分他自共以隨立量有自等三故總計似同初二各四第三有六以有有四無中有二成其十四兼後二過總有十六分自他共有四十八於中細分有體無體全分一分復以似因問似喻過數乃無量恐繁且止如是名似同法喻品述曰第二總結可知似異法中所立不遣述曰下解似異五過為五此即第一於中有三初簡牒次指體後釋成此初也簡有二重一簡似同云似異法中二簡自五以似異中過有五種先明所立不遣故云似異法中所立不遣者即牒也且如有言諸無常者見彼質礙譬如極微述曰第二指體宗因同前此中不舉但標似異所立不遣此類非一隨明於一故云且也或不具詞似五明一故亦云且由於極微所成立法常性不遣彼立極微是常住故述曰下釋成有二初所立有後能立無此初也初三句依指正釋下兩句牒計顯成聲勝二論俱計極微常故不遣所立能成立法無質礙無述曰下明能立無準所立有亦應言彼立極微有質礙故文影略爾此中亦有兩俱隨一猶豫無依不遣或無第四過以異喻體但遮非表依無非過但有前三或亦有之如立我無許諦攝故異喻如空對無空論雖無所依亦不遣所立宗法異喻亦無俱同無故然前解勝此論所明聲對勝論兩俱不遣若對薩婆多隨一不遣薩婆多計微非常故隨他準知猶豫不遣者如言彼山等處定應有火以現煙故如餘厨等處異喻諸無火處皆不現煙如餘處等然有火處亦無有煙故懷猶豫不現煙處火為有無故猶豫不遣維摩經説如無煙火如燋穀牙今據顯相故無違也然隨所應有自他共全分一分等能立不遣述曰下解第二有三初牒章次指體後釋成此初也謂説如業述曰指體也但遣所立述曰釋成有二此釋所立無以彼計業是無常故不遣能立彼説諸業無質礙故述曰辨能立有有二初明能立有以牒計顯成準前應言彼説諸業體是無常無質礙故牒計顯有以影彰無此對勝論俱能立不遣對薩婆多等隨一不遣餘思可悉俱不遣述曰解第三過文亦有三此即牒也對彼有論説如虗空述曰此指體也即聲論師對薩婆多等立聲常無礙異喻如空由彼虗空不遣常性無質礙性述曰釋成有二初明二立有後約計釋成此初也以説虗空是常性故無質礙故述曰約計釋成也兩宗俱計虗空實有遍常無礙所以二立不遣也問似同不成俱中開二似異不遣何不別明答同約遮表無依成過異遮非表依無俱遣故無非過問異喻但遮異無非過遮有立異無豈非過如立虗空定應非有以非作故如龜毛等諸常有者皆必非作如空華等豈非無體俱不遣耶答前望二宗對立聲常故同開二此約別立故合為一立有異有即有不遣若無必遣立無異無即無不遣異有必遣故不開二或可亦有以同影異故略不論何者如數論師對勝論立神我無作以無礙故如太虗空異喻云諸有作者皆非無礙猶如時實即有俱下遣以勝論師所計時實無作無礙故説如龜毛等即無俱不遣以於龜毛等亦是非作非有礙故此中亦有兩俱不遣隨一猶豫及無所依亦隨所應有自他共分全等過如理思準不離者述曰解第四過文分為二初牒章後示法此初也謂説如瓶見無常性有質礙性述曰此示法離者不相屬著義言諸無常者即離常宗見彼質礙離無礙因將彼無常屬著質礙返顯無礙屬著常宗故聲無礙定是其常今既但云見彼有無常性有質礙性不以無常屬有礙性即不能明無宗之處因定非有何能返顯有無礙處定有其常不令常無礙互相屬著故為過也合即先合聲上無礙欲令無礙常住定隨離即先離聲上常住欲令無宗因定不有返顯無礙之所至處定常住宗義隨逐故理門云説因宗所隨宗無因不有依第立顯喻由合故知因此意由依第五囀聲從所作生故是無常又由及依如正喻解以顯於喻因合方明準此即是雙離宗因合應返此倒離者述曰下解第五過文有二如前科此初也謂如説言諸質礙者皆是無常述曰示法宗因同喻皆悉同前異喻應言諸無常者見彼質礙即顯宗無因定非有返顯正因除其不定及相違濫返顯有因宗必隨逐此則顯彼宗因今既倒云諸有質礙皆是無常自以礙因成非常宗不簡因濫返顯於常此有二過如正異辨不離倒離亦可有三自他及共無一分過總計似異中亦有五十四如似同説或減十二俱不遣中或不開故餘細分別亦準上知如是等似宗因喻言非正能立述曰此解似中大文第二結非真也言如是者即指法之詞復言等者顯有不盡向辨三支皆據中言而有過故未明缺減非在言申分分單雙此等諸過故以等等宗因喻三皆有不盡故牒前三總結非也若爾何不言如是似宗因喻等而言如是等似宗因喻耶答喻下言等恐有離前似宗因喻別有似支不唯於此三支辨過顯離此三更無有別似立支故於前等也復次為自開悟當知唯有現比二量述曰上已明真似立次下第三明二真量是真能立所須具故次明之文分為四一明立意二明遮執三辨量體四明量果或除伏難此即初二與頌先後次第不同如前已辨問若名立具應名能立即是悟他如何説言為自開悟答此造論者欲顯文約義繁故也明此二量親能自悟隱悟他名及能立稱次二立明顯亦他悟踈亦能立猶二燈炬互相影故理門論解二量已云如是應知悟他比量亦不離此得成能立故知能立必藉於此顯即悟他明此二量親疏合説通自他悟及以能立此即兼明立量意訖當知唯有現比二量者明遮執也唯言是遮亦決定義遮立教量及譬喻等決定有此現比二量故言唯有問古立有多今何立二答理門論云由此能了自共相故非離此二別有所量為了知彼更立餘量故依二相唯立二量問陳那所造因明意欲弘於本論解義既相牟楯何以能得順成答古師從詮及義智開三量以義詮從智亦復開三陳那已後以智從理唯開二量若順古并詮可開三量廢詮從旨古亦唯二以聖教者二量之具或謂所憑當知唯言但遮一向執異二量外別立至教及譬喻等故不相違廣此二量如章具辨有依於此唯二量文遂立量云似現比等皆比量攝如疏具述有過不習又傳立云外道立宗現比量外有至教等量云非比極成現所有量非現量攝極成現量所不攝量所攝故猶如比量言非比簡二分相符以佛法許比量是現所有非現量攝復欲取為同喻即為顯因具足三相故言極成現量簡不極成以佛法許至教亦是現量攝故言所有者又簡自語相違若直言極成現量非現量攝既言極成現量復非現量攝故有相違又若不言所有不詮得至教量是現所有然狹帶説故云所有量因中言極成簡隨一過以大乘至教量一分現量攝故又量所攝簡非量相符以大乘許非量現量所有非現量攝又成立離比量外更有喻等量者以大乘許譬喻量等非現量攝故立量云非現極成比所有量非比量攝極成比量所不攝量所攝故如現量簡過如前陳那菩薩與作決定相違初立現量之外無別至教取其一分量云非現極成比所有一分不極成量是現量攝比量所不攝量所攝故如現量言一分者取定心緣教即現量攝不取散心散心緣教是比量攝後簡準此又成離比量外無義準等量云非比極成現所有一分不極成量是比量攝現量所不攝量所攝故如比量簡過如前又助難云準外道量能別之中犯他一分不極成過以至教許有餘不立故是故陳那依此二相唯立二量其二相體今略明之一切諸法各附己體所有別理如於色等上苦無常等不由安立本有自性即名自相不同經中所説自相以分別心假立一法貫通諸法如縷貫華由智安立方説為有此名共相與經中共相體別如佛地論第六廣説有説自相如火熱相等名為自相若為名言所詮顯者此名共相此釋不然違佛地論若如火熱等方名自相者定心緣火不得彼熱應名緣共及定心緣教所詮之理亦為言所詮亦應名共相若爾定心應名比量不緣自相故然外道等計一切言得法自相如名召火但取於火明得火之自相佛法名言但得共相彼即難云若得共相喚火之時應得於水大乘解云一切名言有遮有表言火遮非火非得火自相而得火來者名言有表故得於火有助外難云汝若言得火自相説及心緣應燒心口以得自相故若他反難云汝定心緣火既得自相應亦燒心此既不燒假智及詮雖得自相而不被燒如何難我即有解云境有離合殊緣合境者被燒定心離取故不被燒由此前難但應難他名言名言依語表語表即依身是合中知若得自相即合被燒今問此難為難因明自相為經中自相耶答云依因明自相若爾此難並不應理因明自相非要如火熱為自相如何難彼令火燒心等設縱依經自共相難即不得言假智及詮得自相救彼假智詮論自誠説得共相故若據外宗彼非假智得自相故可依此智以難於彼彼返難曰定心得自相應定心被燒亦不得以離合取救誰言定心唯離取境瑜伽説通離合取故不許定中起五識者可不通離合既許起五識意與彼俱故通離合又若離取即不被燒亦應離取不得自相火以熱觸為自相故可通彼難云心細色粗礙不礙別雖得自相亦不彼燒且如上界色尚不許下界粗火所燒恐心色殊寧得被燒由此第八及身識等雖取火自相而皆不被燒故不得以離合釋難今解且自共相外道未必皆有此二佛法之中有此義故彼外道等但言火等即得火體火體為自相而不立共相不須分別經之與論故總難之若如説火得火自相即應燒口此據言火在於口中言得自相自相亦不離口中故應燒口或可抑難非正難彼合口被燒口是發語之緣非正語故正難於彼聲應被燒同身扶塵俱有等故或可難彼尋名取境之心亦得自相得自相者心應覺熱若他返難今尋名緣火之心亦應覺熱者自是被屈非預我宗尋名假智不得彼火之自相故若覺熱觸即非假智稱境知故設定心中尋名緣火等亦是假智不同比量假立一法貫在餘法名得自相各附體故名得自相是現量收不得熱等相故假智攝知假想定變水火等身雖在中而無燒濕等用如上定心緣下界火雖是現量所帶相分亦無熱濕等用問若爾實變水火地等時心覺有熱濕等不合雖覺暖濕等而不分別故得火等自相問因明自共相有體無體耶答現量心緣所得自相可取有體亦緣有體法冥自體故若比量緣有法及法自共二種緣因三相此之共相全無其體設定心緣因彼名言行解緣者即是假智依共相轉然不計名與所詮義定相屬著故云得自相然是假智緣得名為共相作行解故此亦共相但於諸法增益相狀故是無體同名句詮所依共相若諸現量所緣自相即不帶名言冥證法體彼即有法即法性故若佛心等緣比量共相等亦無有體許體遍緣故亦無失問瑜伽云聞謂比量即緣名等何得云現量答彼約散心未自在位定自在位即許現緣有説共相亦是有體假此定不然以何為體若有體者百法何收答言法同分攝許不相應是有體假此亦不然誰言不相應是有體假瑜伽五十二云緣去來生滅等是緣無識若許有體不證緣無問空無我等此之共相為有體無有言有體即此色等非我我所名空無我等故此非無故成唯識云非異非不異如無常等性又云若無體者如何與行非一異耶今謂不爾若言即此色等非我我所名空無我故説非無即應與色等是一而非異如何非一異又違五十二五證緣無識一緣無我觀智二緣飲食飲食即香等離色香等都無所有三耶見緣無四又諸行中無常無恆不變共相觀識非不緣此五緣去來生滅等既引證緣無明知此無體且止傍論此中現量謂無分別述曰下辨體有二初辨現量體後明比量體辨現量中文復分四一簡彰二正辨三釋義四顯名此即初二言此中者是簡持義向標二量簡去比量持彰現量故曰此中言現量者即正所持欲明之量謂無分別者第二正辨言現量者謂無分別問以何智緣何境離何分別若有正智於色等境述曰第三釋義文復分三初簡邪二定境三所離此初二也若有正智簡彼邪智謂如翳目見於毛輪第二月等雖離名種等所有分別而非現量故雜集云現量者自正明了無迷亂義此中正智即彼無迷亂離旋火輪於色等義者此定境也言色等者等取香等義謂境義離諸映障即當雜集明了雖文不顯義必如是不爾簡略過失不盡如智雖正亦無分別緣彼障境應名現量故離名種等所有分別述曰此所離也謂有於前色等境上雖無映障若有名種等諸分別亦非現量故須離此名言分別種類分別等取諸門分別故理門論云遠離一切種類名言假立無異諸門分別言種類者即勝論師大有同異及數論師所有三德等名言即目短為長等皆非稱實名為假立依共相轉名為無異諸門者二十三諦及六句等或離一切種類名言名言非一故名種類即緣一切名言所詮定相計屬依此名言假立一法貫通諸法名為無異遍宗定有異遍無等名為諸門此即簡盡若唯簡外道及假名言不簡比量心之所緣過亦不盡故須離此所有分別方為現量若一往言無二或三所有分別有太寬失非彼二三全非現量準七攝三意地唯除無分別智餘位隨應恆有破故隨所應離講者敘之然離分別略有四類一五識身二五俱意三諸自證四諸定心此言於色等即是五識故理門論次引頌云有法非一相根非一切行唯內證離言是色根境界次言意地亦有離諸分別準證行轉又於貪等諸自證分諸修定者離教分別皆是現量問此入正理為同於彼具明四類為但五識答有二解一云同彼於色等境且明五識以相顯故此偏説之彼論廣明故具説四二云具攝言也等義不唯五境彼之三種亦離名種等所有分別此略總合彼廣別説問別明於五五根非一各現取境可名現現別轉餘三如何名現別轉答各附體緣不貫多法名為別轉文同理門義何妨別若依初釋即無此妨問言修定者離教分別豈諸定內不緣教耶答雖緣聖教不同散心計名屬義或義屬名但藉能詮而悟所詮然不分別定相屬義故云離教分別非全不緣方名現量若不爾者應無漏心皆不緣教八地已去何須佛説現現別轉故名現量述曰此顯名也此四類心或唯五識現體非一名為現現各附境體親明而取離貫通緣名為別轉由此現現各各別緣故名現量故者結上所以是名現量類定其名文上雖無是字準解比量即合有之彼文無故闕結所以影顯有故文巧略也或是為故但為互文其義相似依理門論云由不共緣現現別轉故名現量五根各各明照自境名之為現識依於此名為現現各別取境名為別轉若爾互用豈亦別緣答依未自在且作是説若依前解即無此妨或現之量五根非一名現現識名為量現唯屬根準理門釋理則無違若通明四意根非現又闕其識自體現名但隨所應依主持業二種釋也言比量者述曰下明比量文分為四一牒量名二出總體三重釋義四結量名此即初也謂藉衆相而觀於義述曰此總出比體初句出因次句顯果衆相謂因藉謂待藉謂若有智藉三相因因相有三故名為衆或并言因詮三相故亦名為衆又解但義自比量故現比二因皆且三相故皆云衆若其言因是前能立悟他門中此自比量疏亦悟他故能立後説故理門云如是應知悟他比量亦不離此得成能立即生因因兼了果因總名量故謂待此因而方觀彼所立宗義相有三種如前已説由彼為因於所比義述曰下重釋義有二初總釋因次別顯果此初文也言相有三釋前衆相離重言失故指如前由彼為因釋前藉字由即因由藉待之義於所比義此即釋前而觀於彼所立宗義前照境之能因之為觀後約籌慮之用號之曰比有正智生述曰此別顯果初明生因果次明了因果此即初也若從他生若自比解俱名正智或簡因濫謂雖有智藉三相因而觀所立猶預解起或違智生此因失如前決定相違之因或可釋疑前但略指三相如前即有疑云如聲勝論因皆三相豈緣彼智即為正耶遂即釋云雖具三相有正智生方真比量彼智成疑故不為正了知有火或無常等述曰此明了因果或舉所了果意明能了因正顯自悟比量故了謂了因即前生果然下云於二量中即智名果者以生因果即體是量一體義分難故偏辨不爾此中攝因不盡正比量智而為了因火無常等是所了果以其因有現比不同果亦兩種火無常別了火從煙量因起了無常等從所作等比量因生此二望智俱為遠因是量具故是量境故或緣於因三相之智望了宗智猶疏於念故説為遠名為量具或緣此二因之智及緣因之念為智近因憶本先知所有煙處必定有火憶瓶所作而是無常故能生智了彼二果初解遠近理將為勝故門論中舉二量已後別説念準彼即是以境并了因智俱名現比量故理門云謂於所比審觀察智從現量生或比量生及憶此因與所立宗不相離念由是成前舉所説力念因同品定有等故是近及遠比度因故俱名比量問現量者為境為必答二種俱是境現量所緣從心名現量或體顯現為心所量名為現量問此言比量者為比量智為所觀因答即所觀因及知此聲所作因智此未能生比量智果知有所作處即與無常宗不相離者是念力故能生比智皆名比量然比量體正取解宗之智故下云於二量中即智名果亦名為量故問若爾現量知因智念俱非比量智之正體何名比量答此三能為比量之智近遠生因因從果名故理門云是近及遠比量因故俱名比量又云此依作具作者而説如似伐樹斧等為作具人為作者彼樹得倒人為近因斧為遠因有云斧親斷樹為近因人持於斧疏非親因此現比量為作具憶因之念為作者或復翻此簡前二釋故名比量然前解正又解作者正了宗智作具即是現比二因及憶因宗不相離念俱名比量者依作者作具而説故此解俱名量所以不欲宣解能生比智近遠之因問理門論中現比量境及緣因念隨其所應俱名現比如何此中但説於智何理得知彼於現境亦名現量比量之因亦名比量答理門論云問何故此中與前現量別異遠立此問詞為現二門此處亦應於其比果説為比量彼處亦應於其現因説為現量俱不遮止此答詞即互明也今者此中但出量體略彼作具之與作者略廣故爾是名比量述曰第四結名由藉三相因比度知有火無常等故是名比量故是二字如前應知於二量中即智名果是證相故如有作用而顯現故亦名為量述曰第四明量果也問前有正智了知有火及無常等以明果訖如何此處復明量果答前明比量智所量之果此明了宗能量智果能量所量量果別故或前望生因果此辨能了果或除伏難謂有難云有尺稱等為能量絹布等為所量記數之智為量果汝此二量火無常等為所量現比量智為能量何者為量果或薩婆多等難我以境為所量根為能量彼以根見等不許識見故根能量依根所起心及心所而為量果汝大乘中即智為能量復何為量果或諸外道執境為所量諸智為能量神我為量果彼計神我為能受者知者等故汝佛法中既不立我何為量果智即能量故論主答云於此二量即智名果即者不離之義即用此量智還為能量果彼復問云何故即智復名果耶答云夫言量果能知於彼即此量智親能明證彼二境相所以名果彼之相境相於心上現名而有顯現假説心之一分名為能量云如作用既於一心義分能所是故量果亦名為量或彼所量即於心現不離心故亦名為量以境亦心依二分解或此中意約三分明能量見分量果自證分體不離用即智名果是能證彼見分相故相謂行相體相非相分名相如有作用而顯現者簡異正量彼心取境如日舒光如鉗鉗物親照執故今者大乘依自證分起此見分取境功能及彼相分為境生識是緣知假如有作用自證能起故云而顯現故不同彼執直實取境此自證分亦名為量亦彼見分或此相分亦名為量不離能量故如言唯識等此順陳那三分義解故理門云又於此中無別量果以即此體似義生故似有用故假説為量有分別智於義異轉名似現量述曰下第四大段明二似量真似相形故次明也於中有二初似現後似比似現之中復分為二初標後釋此即初也標中有三一標似現體二標似所由三標定似名有分別智謂有如前帶名種等諸分別智不稱實境別妄解生名於義異轉名似現量此標似名也謂諸有智了瓶衣等分別而生述曰此下釋也釋文亦三即釋初也謂諸有緣瓶衣等智不稱實境妄分別生準理而言有五種智皆名似現一散心緣過去二獨頭意緣現在三散意緣未來四緣三世疑智五緣現在惑亂解謂見杌為人覩陽炎為水及瓶衣等名惑亂智皆非現量是似現收或諸外道及餘情類謂現量得故故理門云但於此中了餘境分不名現量由此即説憶念比度悕求疑智惑亂智等於鹿愛等皆非現量隨先所愛分別轉故五智如次配意念等智下言等是向內等離此更無可外等故於鹿愛等者西城共呼陽炎為鹿愛鹿以熱渴謂之為水而生愛故此境言等等彼見杌謂之為人病眼空華毛輪二月及瓶衣等故彼復言如是一切世俗有中瓶等數等舉等有性瓶性等智皆似現量是假非真名世俗有舉瓶等取外道五唯量實句義等數即勝論所計德句言等取彼量合離等舉即業句取捨屈申行舉即彼取或是彼行以等於餘有性即大有瓶性等瓶性即同異等取和合句等智即緣此之智皆似現量此等皆於五塵實境之中作餘行相假合餘義分別轉故問此緣瓶等智既名似現現比非量三中何收答非量所攝問如第七識緣八執我可名非量泛緣衣瓶既非執心何名非量答應知非量不要執心但不稱境別作餘解即名非量以緣瓶等心雖不必執但惑亂故謂為實瓶故是非量問既有瓶衣緣彼智起應是稱知何名分別由彼於義不以自相為境界故述曰此釋所由由彼諸智於四塵境不以自相為所觀境於上增益別實有物而為所緣名為異轉此意以瓶衣等體即四塵依四塵上假名瓶衣唯有共相無其自體此智不以本自相四塵而為所緣但於此共相瓶衣假法而轉謂為實有故名分別名似現量述曰此釋定似名由彼瓶衣依四塵假但意識緣共相而轉實非眼識現量而得自謂眼見此瓶衣等名似現量又但分別執為實有謂自識現得亦名似現不但似眼現量而得名似現量此釋盡理前解句故若似同智為先所起諸似義智名似比量述曰此第二解似比文亦有二初標後釋此即初也於中有三初標所因次標似體後標似名似因智者似因及緣似因之智為先生後了似宗智名似比量問何故似現先標似體後標似因此似此中先因後果答彼之似現由率遇境即便取解謂為實有非後疇度故先標果此似比量要因在先後方推度邪智後起故先舉因或復影顯三句三文如次配釋似因多種如先已説用彼為因述曰下釋如先所説宗之九過因十四過及其似喻皆生智因並名似因前已廣明恐繁故指準標有智及因今釋亦有所知之因及能知智皆不正故俱名似因然釋文無即舉因顯用彼因智以為先因準理標中亦合云若似因智及耶憶彼所立宗因不相離念為先文略故爾釋文隨標亦略不説於似所比諸有智生述曰釋前所起諸似義智起之與生義同文異如於霧等妄謂為煙言於似所比耶證有火於中智起言有智生不能正解名似比量述曰此釋名也由彼耶因妄起耶智不能正解彼火有無等是真之流而非真故名似比量復次若正顯示能立過失説名能破述曰下第五大段解真能破文段分三初總標能破次辨能破境後兼顯悟他結能破號或分為四初二如前第三出能破體第四結能破名或初標後釋標中有三若正顯示標能破體能立過失標能破境説名能破標能破名後釋中先境次體後名且依初科此即初也他立有失如實能知顯令他悟名若正顯示能立過失其失者何謂初能立缺減過性立宗過性不成因性不定因性相違因性及喻過性述曰此辨能破境則他立失分二初辨闕支次明前失言初能立缺減過性此即初辨闕支或總無言或言無義過重先明故云初也此之缺減古師約宗因喻或七六句陳那已後約因三相亦或六七並如前辨或且約陳那因三相為七句者闕一有三者如數論師對聲論立聲是無常眼所見故聲無常宗瓶色盆等為同品虗空等為異品此但闕初而有後二聲論對薩婆多立聲為常宗所聞性故虗空為共同品瓶盆等為異闕第二相所量性因闕第三相闕二有三者如立聲非勤發鼻取故虗空等為同瓶盆等為異闕初二相如立我常對佛法者因云非勤勇發虗空為同電等為異因闕所依故無初相電等上有闕第三相四相違因即闕後二相如立聲常眼所見故虗空為同色等為異三相俱闕立宗過性等下別明支過此等或於能破立所破名故理門云此中能破闕減等言者謂前所説闕減言詞諸分過失彼一一言皆名能破或於所破立能破名理門又云云何同法相似能破於所作中説能作故傳生起故作如是説問云何能立缺減等名為能破能破理在出彼過言故答此於能破説所破名據實能破在於言也或於所作説能作名能立缺減等為因能起此能破言名為能作即能破言從彼似起名為所作起及生作名殊義一破實在言言缺減能破等是於所作立能作名亦如於果立彼因號或可此唯約境以下更云顯示此言若前是言何須後説顯示此言開曉問者故名能破述曰兼顯悟他結能破號立者過生敵責汝失立證俱問其失者何名為問者敵能正顯缺減等非明之在言名顯示此由能破言曉悟彼問令知其失捨妄趣真此即悟他名為能破此即兼明悟他以釋能破名簡雖破他不令他悟亦非能破亦有立量破他名為能破此中且約出過破他名為能破或由彼立量有過故方立量破即亦顯彼故此攝盡若他無過量破即似非正能破若不實顯能立過言名似能破述曰此大段第六明似能破文分為三初標似能破次出似破體後結似破名并釋所以此初也謂於圓滿能立至有過喻言述曰此出喻能破體初明妄言闕後辨正言即敵者量圓妄言有缺宗因喻正虗謂為耶不了彼真興言自負由對真立名似能破準真能破思之可悉如是言説名似能破述曰下結似能破名并釋所以於中分二即結及釋此即初也如是者指前之詞言説者即圓滿能立缺減言等如此等言名為似破問何故於圓滿能立顯示缺減性言等為似能破以不能顯他宗過故彼無過故述曰釋所以夫能破者彼立有過如實出之顯示立證令知其失能生彼智此有悟他之能可名能破彼實無犯妄起言非以不能顯他宗之過何不能顯彼無過故又他過量不如實知於非過支妄生彈詰亦是不能顯他過失以無過故設立量非不如其非正能顯示亦似能破今據決定舉真能立且止斯事述曰大文第三方隅略示顯息煩文論斯八義真似實繁略辨為八廣之由具顯恐無進之漸故今略説云且止斯事已宣少句義為始立方隅其間理非理妙辨於餘處述曰一部之中文分為二此即第二顯略指廣上二句顯略下二句指廣略宣如前少句文義欲為始學立其方隅八義之中理與非理如彼理門因門集量具廣妙辨沼雖廁法莚朽情難飾濫因承乏無以減言於師曾獲半殊緣闕未蒙全寶因訓之次舉螢而助曦光其中文理是非有智幸為詳定保元二年專寺長講會談因明大疏至于能立不成已下疏文諸本不同或文上加文取捨致謬或字下止字是非多過然今且依唐和論家且以末學愚案𭜺奉講疏有兩本之由一慈恩製如明詮導疏二淄州續如今所寫疏本疏文略而理狹末疏詞廣而義豐續加之文本無末有半珠雖獲全寶莫窺但有一文本具末闕如以量所攝言簡不定過也詞異師資勿輒添削疏分本末不偏是非矣于時同三年春三月七日大法師藏俊記之今勘唐和諸記能立不成已下有基疏有沼續明詮導疏基撰也今所寫疏沼續也要義抄云基疏初量不言極成比所有直言非現比所有一分不極成治續云極成比所有後量有法基疏沼續同云極成現所有一分不極成量也已上明詮云言將彼貿礙屬著無常者沼法師云將彼無常屬者貿礙云云餘文同也已上明燈抄云文可通彼難主離合釋難者此沼師新續注加文也已上周記記明詮上下其意同也然有人見注文云後闕未獲且獲半珠謂無基疏者違上諸文不可依信但明燈抄云文論能立法至慧沼續者注云後闕未得且獲半珠者或有疏本無此文準此卷末沼法師語故彼文云於師曾獲半珠緣闕未蒙全寶由此準知沼師自注今觀三卷已專伏膺兩卷餘半既是過半豈是半珠非全名半何必等分名半焉如華嚴序云然一部之典才獲三萬餘言唯啓半珠未窺全寶言此經下本有十萬偈而晉朝諍才三萬六千偈所獲尚少來及半分而猶為半珠今此亦爾不全名半耳云云下文云於師曾獲半珠緣闕未蒙全寶者有唐本疏能立不成終注云後闕未得且獲半珠已上重修序云既逼半珠之情遂有獲麟之望今意如彼言緣闕者為師為資乎未詳何也云云此文似無基疏然無續加文故作此言同疏注也元曆乙巳之歲暮春上旬之候為充當年維摩會講師學因明疏之次以祖師權別當權少僧都之正本而摸畢大法師信憲
